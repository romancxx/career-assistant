services:
  qdrant:
    image: qdrant/qdrant:latest
    container_name: career-assistant-qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - ./data/qdrant:/qdrant/storage

  ollama:
    image: ollama/ollama:latest
    container_name: career-assistant-ollama
    ports:
      - "11434:11434"
    volumes:
      - ./data/ollama:/root/.ollama